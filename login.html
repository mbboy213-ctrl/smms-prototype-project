<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Monitoring Maintenance System - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.3);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.3);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.3);
            --warning: #f59e0b;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border-radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 56px 56px;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 64px;
            width: 100%;
            max-width: 480px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            text-align: center;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.6;
        }

        .logo-section {
            margin-bottom: 48px;
        }

        .logo-mark {
            width: 220px;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 20px 24px;
            border-radius: var(--border-radius);
            border: 2px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(59, 130, 246, 0.02);
        }

        input:hover:not(:focus) {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 20px;
            border-radius: var(--border-radius);
            border: none;
            background: linear-gradient(135deg, var(--primary), rgba(59, 130, 246, 0.9));
            color: white;
            font-weight: 700;
            font-size: 1.125rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 8px 24px var(--primary-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px var(--primary-glow);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            color: var(--danger);
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--border-radius);
            text-align: center;
        }

        .loading {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .login-container {
                padding: 48px 32px;
                max-width: 100%;
                margin: 20px;
            }

            .logo-mark {
                width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img class="logo-mark" src="assets/smms-logo.svg" alt="SmmS logo">
            <div class="subtitle">Smart Monitoring System</div>
        </div>

        <form onsubmit="login(event)">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        async function login(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');

            // Show loading state
            loginBtn.disabled = true;
            btnText.innerHTML = '<div class="loading"><div class="spinner"></div>Authenticating...</div>';
            errorDiv.style.display = 'none';

            try {
                const res = await axios.post('http://localhost:3000/api/login', { username, password });

                if (res.data.success) {
                    const user = res.data.user;
                    localStorage.setItem('factory_session', JSON.stringify(user));

                    // Show success state briefly
                    btnText.innerHTML = '<div class="loading">✓ Success</div>';

                    // Redirect based on role after a short delay
                    setTimeout(() => {
                        if (user.role === 'manager') {
                            window.location.href = 'manager.html';
                        } else if (user.role === 'maintenance') {
                            window.location.href = 'dashboard.html';
                        } else if (user.role === 'operator') {
                            // Redirect to machine-specific page
                            const machine = user.assigned_machine;
                            if (machine) {
                                window.location.href = `${machine}.html`;
                            } else {
                                showError('No assigned machine found.');
                            }
                        } else {
                            showError('Unknown role.');
                        }
                    }, 800);

                } else {
                    showError('Invalid credentials.');
                }
            } catch (e) {
                console.error(e);
                showError('Login failed. Please try again.');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');

            errorDiv.innerText = message;
            errorDiv.style.display = 'block';

            // Reset button state
            loginBtn.disabled = false;
            btnText.innerText = 'Sign In';
        }
    </script>
</body>
</html>
